name: test

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: Check repository
        uses: actions/checkout@v3

      - name: npm install
        working-directory: ./frontend
        run: npm i

      - name: npm build
        working-directory: ./frontend
        run: npm run build

      # 기존 docker run 방식들을 하나로 묶어 docker-compose로 실행
      - name: Docker Compose Deploy
        run: |
          # 기존 컨테이너 내리고, 이미지 빌드 후 백그라운드 실행
          docker-compose down
          docker-compose up -d --build
        env:
          # GitHub Secrets에 등록된 값들을 docker-compose.yml로 전달
          MARIADB_USER: ${{ secrets.MARIADB_USER }}
          MARIADB_PASSWORD: ${{ secrets.MARIADB_PASSWORD }}
          MARIADB_HOST: ${{ secrets.MARIADB_HOST }}
          MARIADB_PORT: ${{ secrets.MARIADB_PORT }}
          MARIADB_DATABASE: ${{ secrets.MARIADB_DATABASE }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}